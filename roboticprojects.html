<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoboIdeas 2026 - منصة مشاريع الروبوتيك</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* المتغيرات التصميمية */
    :root {
      --primary: #2e7d32;
      --secondary: #1565c0;
      --bg: #f0f2f5;
      --white: #ffffff;
      --text: #2c3e50;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      margin: 0;
      color: var(--text);
      line-height: 1.6;
    }

    /* الهيدر */
    header {
      background: linear-gradient(135deg, #1b5e20, #4caf50);
      color: white;
      padding: 60px 20px;
      text-align: center;
      clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
    }

    header h1 { margin: 0; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    header p { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }

    /* النافبار */
    nav {
      background: #222;
      display: flex;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav a {
      color: white;
      padding: 18px 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover { background: var(--primary); }

    /* الحاوية والفلاتر */
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

    .filters {
      background: var(--white);
      padding: 25px;
      border-radius: 15px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: var(--shadow);
      margin-bottom: 40px;
    }

    .filters input, .filters select {
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
      min-width: 220px;
      transition: 0.3s;
    }

    .filters input:focus { border-color: var(--primary); }

    /* شبكة المشاريع */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: 0.4s;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }

    .card-icon {
      height: 140px;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
    }

    .card-content { padding: 25px; flex-grow: 1; }
    
    .level-badge {
      font-size: 0.75rem;
      font-weight: bold;
      padding: 5px 12px;
      border-radius: 30px;
      color: white;
      margin-bottom: 15px;
      display: inline-block;
    }

    .beginner { background: #4caf50; }
    .intermediate { background: #ff9800; }
    .advanced { background: #f44336; }

    .card h3 { margin: 10px 0; font-size: 1.3rem; }
    .card p { color: #666; font-size: 0.95rem; margin-bottom: 20px; }

    .btn-start {
      width: 100%;
      padding: 14px;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .btn-start:hover { background: #0d47a1; letter-spacing: 1px; }

    /* النافذة المنبثقة (Modal) */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 2000;
      padding: 20px;
    }

    .modal-content {
      background: white;
      max-width: 800px;
      margin: 2% auto;
      border-radius: 25px;
      padding: 40px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    .close-modal {
      position: absolute;
      top: 20px; left: 25px;
      font-size: 2.5rem;
      cursor: pointer;
      color: #ccc;
    }

    .close-modal:hover { color: #333; }

    .modal-header { border-bottom: 3px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 25px; }
    .modal-header h2 { color: var(--primary); margin: 0; font-size: 1.8rem; }

    .detail-box { margin-bottom: 30px; }
    .detail-box h3 { 
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--secondary);
      margin-bottom: 15px;
    }

    .detail-box ul { padding-right: 25px; }
    .detail-box li { margin-bottom: 10px; font-weight: 500; }
    .detail-box p { background: #f8f9fa; padding: 20px; border-radius: 15px; border-right: 5px solid var(--primary); }

    footer {
      background: #222;
      color: #999;
      text-align: center;
      padding: 50px 20px;
      margin-top: 60px;
    }
  </style>
</head>

    `).join('');
  }

  // دالة فتح المودال
  window.openProject = function(id) {
    const p = projects.find(item => item.id === id);
    if(!p) return;

    modalBody.innerHTML = `
      <div class="modal-header">
        <h2>${p.icon} تفاصيل: ${p.title}</h2>
      </div>
      <div class="detail-box">
        <h3><i class="fas fa-tools"></i> 1️⃣ المكونات المطلوبة:</h3>
        <ul>
          ${p.components.map(comp => `<li>${comp}</li>`).join('')}
        </ul>
      </div>
      <div class="detail-box">
        <h3><i class="fas fa-lightbulb"></i> 2️⃣ فكرة المشروع:</h3>
        <p>${p.logic}</p>
      </div>
      <div style="text-align:center; margin-top:20px;">
        <button class="btn-start" style="background:#444; width:auto; padding:12px 50px;" onclick="closeModal()">إغلاق</button>
      </div>
    `;
    modal.style.display = "block";
    document.body.style.overflow = "hidden"; // منع التمرير
  }

  function closeModal() {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
  }

  // إغلاق المودال
  closeBtn.onclick = closeModal;
  window.onclick = (e) => { if(e.target == modal) closeModal(); }

  // البحث والفلترة
  const searchInput = document.getElementById('searchInput');
  const levelFilter = document.getElementById('levelFilter');

  function filterData() {
    const txt = searchInput.value.toLowerCase();
    const level = levelFilter.value;
    
    const filtered = projects.filter(p => {
      const matchTxt = p.title.toLowerCase().includes(txt);
      const matchLevel = level === 'all' || p.level === level;
      return matchTxt && matchLevel;
    });
    render(filtered);
  }

  searchInput.addEventListener('input', filterData);
  levelFilter.addEventListener('change', filterData);

  // تشغيل الصفحة
  render(projects);
</script>

</body>
</html>
